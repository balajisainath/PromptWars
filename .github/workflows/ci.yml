name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-backend:
    name: Lint Python Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install ruff
        run: pip install ruff==0.4.4
      - name: Run ruff
        run: ruff check backend/

  lint-frontend:
    name: Lint Next.js Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run lint
        working-directory: frontend

  lint-geo-service:
    name: Lint Go Geo-Service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest
          working-directory: services/geo-service

  test-backend:
    name: Test Python Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: travelai
          POSTGRES_PASSWORD: travelai_secret
          POSTGRES_DB: travelai_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        working-directory: backend
        run: pip install -e ".[dev]"
      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://travelai:travelai_secret@localhost:5432/travelai_test
          REDIS_URL: redis://localhost:6379/0
          ENVIRONMENT: test
        run: pytest --tb=short -q

  build-docker:
    name: Validate Docker Builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: travelai-backend:test
      - name: Build geo-service image
        uses: docker/build-push-action@v5
        with:
          context: ./services/geo-service
          push: false
          tags: travelai-geo-service:test
      - name: Build graphiti-service image
        uses: docker/build-push-action@v5
        with:
          context: ./services/graphiti-service
          push: false
          tags: travelai-graphiti-service:test
